<!doctype html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#4CAF50">

<title>AUTOZAP GFIN</title>

<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<h2>💰 AUTOZAP GFIN</h2>

<!-- FORM -->
<div class="card">

<input id="desc" placeholder="Descrição">

<select id="pagamento">
  <option>Pix</option>
  <option>Cartão</option>
  <option>Dinheiro</option>
</select>

<select id="categoria">
  <option>Alimentação</option>
  <option>Lanche</option>
  <option>Saúde</option>
  <option>Transporte</option>
  <option>Doação</option>
  <option>Lazer</option>
  <option>Outros</option>
  <option>Roupas</option>
  <option>Educação</option>
</select>

<div class="input-group">
  <span>R$</span>
  <input id="valor" type="number" step="0.01">
</div>

<button class="btn-primary" onclick="enviar()">Salvar</button>

</div>

<!-- GRÁFICO -->
<div class="card">
<canvas id="grafico"></canvas>
</div>

<!-- HISTÓRICO -->
<div class="card">
<h3>📄 Últimas Transações</h3>
<div id="historico"></div>
</div>

</div>

<!-- NAVBAR -->
<div class="navbar">
<button onclick="location.href='index.html'">🏠</button>
<button onclick="location.href='dashboard.html'">📊</button>
</div>

<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
