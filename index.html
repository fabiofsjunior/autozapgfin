<!doctype html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#4CAF50" />

<title>AUTOZAP GFIN</title>

<link rel="manifest" href="manifest.json" />
<link rel="icon" href="favicon.ico" />

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 10px;
}

/* CONTAINER */
.container {
  max-width: 600px;
  margin: auto;
  padding-bottom: 80px;
}

/* CARDS */
.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
}

/* INPUTS */
input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* BOTÃO */
button {
  background: #4CAF50;
  color: white;
  border: none;
  font-weight: bold;
}

/* HISTÓRICO */
.item {
  padding: 10px;
  border-bottom: 1px solid #eee;
  font-size: 14px;
}

.item strong {
  display: block;
}

/* BOTÕES CRUD */
.actions {
  margin-top: 5px;
  display: flex;
  gap: 5px;
}

.actions button {
  flex: 1;
  padding: 5px;
  font-size: 12px;
  border-radius: 6px;
}

.edit { background: #2196F3; }
.delete { background: #f44336; }

/* NAVBAR PWA */
.navbar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  border-top: 1px solid #ddd;
  padding: 10px 0;
}

.navbar button {
  background: none;
  border: none;
  font-size: 14px;
  color: #555;
}

/* RESPONSIVO */
@media (max-width: 480px) {
  .actions button {
    font-size: 11px;
    padding: 4px;
  }
}
</style>
</head>

<body>

<div class="container">

<h2>💰 AUTOZAP GFIN</h2>

<!-- GRÁFICO -->
<div class="card" id="graficoCard">
  <canvas id="grafico"></canvas>
</div>

<!-- FORM -->
<div class="card">
  <input id="desc" placeholder="Descrição" />

  <select id="pagamento">
    <option>Pix</option>
    <option>Cartão</option>
    <option>Dinheiro</option>
  </select>

  <select id="categoria">
    <option>Alimentação</option>
    <option>Lanche</option>
    <option>Saúde</option>
    <option>Transporte</option>
    <option>Doação</option>
    <option>Lazer</option>
    <option>Outros</option>
    <option>Roupas</option>
    <option>Educação</option>
  </select>

  <input id="valor" type="number" placeholder="Valor" />

  <button onclick="enviar()">Salvar</button>
</div>

<!-- HISTÓRICO -->
<div class="card" id="historicoCard">
  <h3>📄 Últimas Transações</h3>
  <div id="historico"></div>
</div>

</div>

<!-- NAVBAR -->
<div class="navbar">
  <button onclick="scrollToTop()">🏠</button>
  <button onclick="scrollToGrafico()">📊</button>
  <button onclick="scrollToHistorico()">📄</button>
</div>

<script src="app.js"></script>

<script>
function scrollToTop() {
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function scrollToGrafico() {
  document.getElementById("graficoCard").scrollIntoView({ behavior: "smooth" });
}

function scrollToHistorico() {
  document.getElementById("historicoCard").scrollIntoView({ behavior: "smooth" });
}

// AUTO UPDATE
setInterval(() => {
  if (typeof carregar === "function") carregar();
}, 10000);

// SERVICE WORKER
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
