<!doctype html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AUTOZAP GFIN</title>

<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
  font-family: Arial;
  background: #f5f6fa;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
}

.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

.info {
  display: flex;
  flex-direction: column;
}

.acoes {
  display: flex;
  gap: 5px;
}

.acoes button {
  background: #eee;
  border: none;
  padding: 5px 8px;
  border-radius: 6px;
  cursor: pointer;
}

.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  border-top: 1px solid #ddd;
  padding: 10px;
}

</style>

</head>

<body>

<div class="container">

<h2>💰 AUTOZAP GFIN</h2>

<div class="card">
  <canvas id="grafico"></canvas>
</div>

<div class="card">
  <h3>📄 Transações</h3>
  <div id="historico"></div>
</div>

</div>

<div class="navbar">
  <button onclick="location.href='index.html'">🏠</button>
  <button onclick="location.href='dashboard.html'">📊</button>
</div>

<script src="app.js"></script>

</body>
</html>
